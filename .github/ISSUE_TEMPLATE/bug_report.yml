name: Bug report
description: Report a problem with rlstatsapi
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the details below so the issue is easier to reproduce and fix.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem clearly.
      placeholder: The client connects, but no events are received after enabling Stats API.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the problem.
      placeholder: |
        1. Run `rlstatsapi listen`
        2. Start Rocket League
        3. Join a match
        4. No events are printed
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: Events should start printing once the match begins.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: The client stays connected but does not print any events.
    validations:
      required: true

  - type: input
    id: rlstatsapi_version
    attributes:
      label: rlstatsapi version
      placeholder: 0.1.4
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: 3.12.0
    validations:
      required: true

  - type: input
    id: operating_system
    attributes:
      label: Operating system
      placeholder: Windows 11 Pro 23H2
    validations:
      required: true

  - type: input
    id: packet_send_rate
    attributes:
      label: PacketSendRate
      placeholder: 1

  - type: input
    id: port
    attributes:
      label: Port
      placeholder: 49123

  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      description: Paste any relevant traceback, logs, or CLI output.
      render: shell

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Anything else that may help reproduce or understand the issue.
