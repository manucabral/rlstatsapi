name: Bug report
description: Report a problem with rlstatsapi
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem clearly.
      placeholder: The client connects, but no events are received.
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Run `rlstatsapi listen`
        2. Start Rocket League
        3. Join a match
        4. No events are printed
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: Describe what you expected to happen.
      placeholder: Events should start printing once the match begins.
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual behavior
      description: Describe what actually happened instead.
      placeholder: The client stays connected but does not print any events.
    validations:
      required: true

  - type: input
    id: rlstatsapi_version
    attributes:
      label: rlstatsapi version
      placeholder: 0.1.5
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: 3.12.0
    validations:
      required: true

  - type: input
    id: operating_system
    attributes:
      label: Operating system
      placeholder: Windows 11
    validations:
      required: true

  - type: input
    id: packet_send_rate
    attributes:
      label: PacketSendRate
      placeholder: 30

  - type: input
    id: port
    attributes:
      label: Port
      placeholder: 49123

  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      description: Paste any relevant traceback, logs, or CLI output.
      placeholder: Paste logs here.

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Anything else that may help reproduce or understand the issue.
