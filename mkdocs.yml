site_name: Rocket League Stats API
site_description: Fast Python client for Rocket League Stats API events
site_url: https://manucabral.github.io/RocketLeagueStatsAPI/
repo_url: https://github.com/manucabral/RocketLeagueStatsAPI
repo_name: manucabral/RocketLeagueStatsAPI

theme:
  name: material
  language: en
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.details

extra_css:
  - stylesheets/extra.css

nav:
  - Introduction: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - Configuration: configuration.md
  - Events: events.md
  - API Reference: api.md
  - Examples: examples.md
  - Typing: typing.md
  - Videos: videos.md
  - Contributing: contributing.md
  - Security: security.md
